<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Weather App </title>
    <link rel="stylesheet" href="weatherstyle.css">
    </head>
    <body>
<div class="card">
    <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false">
        <button class="search-btn"><img src="images/search.png"></button>
       </div>
    <div class="loading-spinner" style="display: none;">
        <div class="spinner"></div>
    </div>

    <div class="error"><p>Invalid city name</p></div>

    <div class="weather"> 
        <img src="images/rain.png" class="weathericon">
        <h1 class="temp">22°c</h1>
        <p class="feels-like">Feels like: 20°c</p> <h2 class="city">New York</h2>
        
        
    <div class="details">
      <div class="col">
        <img src="images/humidity.png">
        <div>
          <p class="humidity">50%</p>
          <p>Humidity</p>
        </div>
      </div>
      <div class="col">
        <img src="images/wind.png">
        <div>
          <p class="wind">15 km/h</p>
          <p>Wind speed</p>
        </div>
      </div>
    </div>
    <div class="details extra-details">
    <div class="col">
        <img src="images/rain.png" style="width: 25px;"> <div>
            <p class="rain-chance">0%</p>
            <p>Rain Chance</p>
        </div>
    </div>
    <div class="col">
        <img src="images/clear.png" style="width: 25px;"> <div>
            <p class="sun-times">--:--</p>
            <p>Sunrise / Sunset</p>
        </div>
    </div>
</div>
<hr style="margin:25px 0; border:0 ; border-top: 1px solid rgba(255,255,0.2);">
<div class="forecast"></div>
  </div>
</div>

<script src="weatherscript.js"></script>
 
    </body>
</html>
